<!-- TODO: Replace CHANNEL_ID with your actual YouTube channel ID -->
<!-- To find channel ID: YouTube > Your Channel > About > Share > Channel ID -->
<div style="text-align: center; padding: 20px 0;">
    <iframe 
        width="100%" 
        height="400" 
        src="https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen
        style="border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 800px;">
    </iframe>
    <p style="margin-top: 12px; color: #6c757d; font-size: 14px;">
        <em>Live every Sabbath at 11:00 AM. If the stream is not live, check back during service times.</em>
    </p>
</div>
